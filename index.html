<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYNE | Built Different</title>
    <style>
        body { margin: 0; font-family: 'Helvetica', sans-serif; background: #000; color: #fff; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: #000; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 5px; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .section-title { text-align: center; padding: 50px 0 20px; text-transform: uppercase; letter-spacing: 3px; }
        .products { display: flex; justify-content: center; gap: 20px; padding: 0 50px 50px; flex-wrap: wrap; }
        .card { background: #111; width: 300px; text-align: center; border: 1px solid #222; padding-bottom: 20px; border-radius: 10px; overflow: hidden; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card h3 { font-size: 14px; letter-spacing: 2px; margin: 15px 0 5px; }
        .card p { font-size: 12px; color: #888; margin-bottom: 15px; }
        .add-btn { background: #fff; color: #000; border: none; padding: 10px 40px; cursor: pointer; font-weight: bold; width: 80%; border-radius: 5px; }
        footer { text-align: center; padding: 40px; border-top: 1px solid #222; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<header>
    <div class="logo">VYNE</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<h2 class="section-title">Featured Products</h2>
<div class="products">
    <div class="card">
        <!-- Star Tee Image -->
        <img src="5534B8FA-20A0-47FD-AE6B-9099B8DC4438.jpeg" alt="Star Tee">
        <h3>STAR TEE</h3>
        <p>$45.00</p>
        <button class="add-btn">ADD TO CART</button>
    </div>
    <div class="card">
        <!-- Zip Hoodie Image -->
        <img src="A9316CA7-9F16-4BD3-AB83-5EBA2F1EEF5B.jpeg" alt="Zip Hoodie">
        <h3>ZIP HOODIE</h3>
        <p>$85.00</p>
        <button class="add-btn">ADD TO CART</button>
    </div>
    <div class="card">
        <!-- Flame Hoodie Image -->
        <img src="D034CAAD-27B3-4F9D-814A-2028BD319B3E.jpeg" alt="Flame Hoodie">
        <h3>FLAME HOODIE</h3>
        <p>$90.00</p>
        <button class="add-btn">ADD TO CART</button>
    </div>
</div>

<footer>
    <p>&copy; 2026 VYNE. All rights reserved.</p>
</footer>

</body>
</html>
